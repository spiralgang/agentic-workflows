name: repair-workflows

# Copilot-free CI repair, reproducibly on GitHub runners.
# Triggered by the org sweep (sweep-repair.yml) which detects failing runs and
# re-dispatches this workflow per repo. Also runnable manually (cross-repo).
on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "owner/repo to repair (default: this repo)"
        required: false
        type: string
      model:
        description: "Model id (Mistral)"
        required: false
        default: "mistral-large-latest"
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target_repo || github.repository }}
          token: ${{ secrets.GH_PAT }}
          path: target

      - name: Checkout repair script from agentic-workflows
        uses: actions/checkout@v4
        with:
          repository: spiralgang/agentic-workflows
          token: ${{ secrets.GH_PAT }}
          path: scripts
          sparse-checkout: .github/scripts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install requests pyyaml

      - name: Run Copilot-free repair agent (Mistral)
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          MISTRAL_MODEL: ${{ inputs.model }}
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO_OWNER: ${{ github.repository_owner }}
          TARGET_REPO: ${{ inputs.target_repo || github.repository }}
        working-directory: target
        run: python3 ../scripts/.github/scripts/fix_repo_workflows.py

      - name: Cleanup
        if: always()
        run: true
